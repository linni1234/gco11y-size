spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8101}
          predicates:
            - Path=/products/**
        - id: pricing-service
          uri: lb://pricing-service
          predicates:
            - Path=/price-lists/**,/prices/**

